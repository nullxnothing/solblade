<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680">
  <style>
    .bg { fill: #0d1117; }
    .titlebar { fill: #161b22; }
    .red { fill: #ff5f56; }
    .yellow { fill: #ffbd2e; }
    .green { fill: #27c93f; }
    .title { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; }
    .text { fill: #e6edf3; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace; font-size: 13px; }
    .dim { fill: #8b949e; }
    .cyan { fill: #56d4dd; }
    .green-text { fill: #3fb950; }
    .yellow-text { fill: #d29922; }
    .purple { fill: #bc8cff; }
    .bold { font-weight: bold; }
    .blue { fill: #58a6ff; }
    .white { fill: #f0f6fc; font-weight: bold; }
    .orange { fill: #f0883e; }
  </style>
  <rect class="bg" width="820" height="680" rx="10" ry="10"/>
  <rect class="titlebar" width="820" height="38" rx="10" ry="10"/>
  <rect class="bg" x="0" y="28" width="820" height="12"/>
  <circle class="red" cx="20" cy="19" r="6"/>
  <circle class="yellow" cx="40" cy="19" r="6"/>
  <circle class="green" cx="60" cy="19" r="6"/>
  <text class="title" x="410" y="23" text-anchor="middle">solblade</text>

  <!-- Prompt 1: init -->
  <text y="68" x="20">
    <tspan class="green-text">~</tspan>
    <tspan class="dim"> $ </tspan>
    <tspan class="white">solblade init</tspan>
  </text>
  <text class="cyan" y="90" x="20">◆  Enter a password for your keystore</text>
  <text class="dim" y="110" x="20">   ●●●●●●●●●●●●</text>
  <text class="green-text" y="134" x="20">✔  Keystore created (~/.solblade/keys/)</text>
  <text class="green-text" y="154" x="20">✔  Wallet "default" created: 7xKX...gAsU</text>
  <text class="green-text" y="174" x="20">✔  RPC set to https://api.mainnet-beta.solana.com</text>

  <!-- Prompt 2: balance -->
  <text y="208" x="20">
    <tspan class="green-text">~</tspan>
    <tspan class="dim"> $ </tspan>
    <tspan class="white">solblade balance --all</tspan>
  </text>
  <text y="232" x="20">
    <tspan class="purple">┌─────────────┬──────────────┬────────────┐</tspan>
  </text>
  <text y="252" x="20">
    <tspan class="purple">│</tspan>
    <tspan class="white"> Wallet      </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="white"> Address      </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="white"> Balance    </tspan>
    <tspan class="purple">│</tspan>
  </text>
  <text y="272" x="20">
    <tspan class="purple">├─────────────┼──────────────┼────────────┤</tspan>
  </text>
  <text y="292" x="20">
    <tspan class="purple">│</tspan>
    <tspan class="cyan"> treasury    </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="dim"> 7xKX...gAsU </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="green-text"> 12.847 SOL </tspan>
    <tspan class="purple">│</tspan>
  </text>
  <text y="312" x="20">
    <tspan class="purple">│</tspan>
    <tspan class="cyan"> trading     </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="dim"> 9xQe...4kPm </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="green-text">  3.201 SOL </tspan>
    <tspan class="purple">│</tspan>
  </text>
  <text y="332" x="20">
    <tspan class="purple">│</tspan>
    <tspan class="cyan"> dev         </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="dim"> 4mNx...rK2j </tspan>
    <tspan class="purple">│</tspan>
    <tspan class="green-text">  0.500 SOL </tspan>
    <tspan class="purple">│</tspan>
  </text>
  <text y="352" x="20">
    <tspan class="purple">└─────────────┴──────────────┴────────────┘</tspan>
  </text>

  <!-- Prompt 3: MCP serve -->
  <text y="386" x="20">
    <tspan class="green-text">~</tspan>
    <tspan class="dim"> $ </tspan>
    <tspan class="white">solblade mcp serve --allow "read,scan,swap"</tspan>
  </text>
  <text y="410" x="20">
    <tspan class="green-text">✔</tspan>
    <tspan class="text">  MCP server started on stdio</tspan>
  </text>
  <text y="430" x="20">
    <tspan class="dim">   Tools exposed:</tspan>
    <tspan class="cyan"> get_balance get_all_balances get_token_balances</tspan>
  </text>
  <text y="450" x="20">
    <tspan class="dim">                  </tspan>
    <tspan class="cyan"> scan_empty_accounts estimate_portfolio_value</tspan>
  </text>
  <text y="470" x="20">
    <tspan class="dim">                  </tspan>
    <tspan class="cyan"> get_swap_quote execute_swap</tspan>
  </text>
  <text y="494" x="20">
    <tspan class="dim">   Wallets:</tspan>
    <tspan class="text">      treasury </tspan>
    <tspan class="yellow-text">[read]</tspan>
    <tspan class="text">  trading </tspan>
    <tspan class="orange">[transfer: 1 SOL/tx]</tspan>
  </text>
  <text y="518" x="20">
    <tspan class="dim">   Session:</tspan>
    <tspan class="text">      active, 58 min remaining</tspan>
  </text>
  <text y="542" x="20">
    <tspan class="dim">   Audit log:</tspan>
    <tspan class="text">    ~/.solblade/audit.db (SHA-256 chained)</tspan>
  </text>

  <!-- Prompt 4: cursor blinking -->
  <text y="576" x="20">
    <tspan class="green-text">~</tspan>
    <tspan class="dim"> $ </tspan>
    <tspan class="text">Ask Claude: </tspan>
    <tspan class="blue">"What's in my Solana wallets?"</tspan>
  </text>

  <!-- Tagline -->
  <text y="630" x="410" text-anchor="middle">
    <tspan class="dim">Your keys. Their hands. Your rules.</tspan>
  </text>
  <text y="655" x="410" text-anchor="middle">
    <tspan class="dim">github.com/shillshady/solblade</tspan>
  </text>
</svg>
